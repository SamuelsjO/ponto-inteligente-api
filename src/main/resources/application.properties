spring.profiles.active=dev

# PostgreSQL database
spring.datasource.url=jdbc:postgresql://localhost:5433/ponto_inteligente
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.locations=classpath:db/migration/postgresql

# Server port
server.port=8090

# SQL logging
logging.level.org.springframework.jdbc.core=DEBUG

# Pagination
paginacao.qtd_por_pagina=25

# JWT (dev only — em prod usar env var JWT_SECRET)
jwt.secret=_@HRL&L3tF?Z7ccj4z&L5!nU2B!Rjs3_
# token duration: 7 days
jwt.expiration=604800

# CORS
cors.allowed-origins=http://localhost:3000

# Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=200,expireAfterWrite=3600s

# SpringDoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
