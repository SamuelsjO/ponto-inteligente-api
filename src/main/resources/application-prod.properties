# PostgreSQL database (env vars)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ponto_inteligente}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.locations=classpath:db/migration/postgresql

# Server port
server.port=${PORT:8090}

# SQL logging
logging.level.org.springframework.jdbc.core=INFO

# Pagination
paginacao.qtd_por_pagina=25

# JWT (obrigatório via env var — sem default)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:604800}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=200,expireAfterWrite=3600s

# SpringDoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
